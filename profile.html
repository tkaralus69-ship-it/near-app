<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEAR Profile</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 30%),
      linear-gradient(180deg, #050816 0%, #0d1328 100%);
    color: #f5f7fb;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 110px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(18px);
    background: rgba(4, 8, 20, 0.78);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 18px 14px;
  }

  .brand-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: 0.18em;
  }

  .subtitle {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.65);
    margin-top: 4px;
  }

  .top-btn {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }

  .screen {
    padding: 18px;
  }

  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.26);
  }

  .profile-hero {
    padding: 20px;
    margin-bottom: 18px;
    text-align: center;
  }

  .photo-wrap {
    position: relative;
    width: 126px;
    height: 126px;
    margin: 0 auto 14px;
  }

  .photo {
    width: 126px;
    height: 126px;
    border-radius: 28px;
    background: linear-gradient(135deg, #243765, #526fb2);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .photo-btn {
    position: absolute;
    right: -4px;
    bottom: -4px;
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 14px;
    background: white;
    color: #09101f;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
  }

  .hero-name {
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 0 6px;
  }

  .hero-text {
    margin: 0;
    color: rgba(255,255,255,0.68);
    line-height: 1.45;
    font-size: 0.93rem;
  }

  .section-card {
    padding: 16px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 800;
    margin: 0 0 14px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .label {
    font-size: 0.9rem;
    font-weight: 700;
  }

  .hint {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
  }

  .input,
  .textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: white;
    border-radius: 16px;
    padding: 14px 14px;
    font: inherit;
    outline: none;
  }

  .input::placeholder,
  .textarea::placeholder {
    color: rgba(255,255,255,0.4);
  }

  .textarea {
    min-height: 110px;
    resize: vertical;
    line-height: 1.45;
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chip {
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.86);
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .chip.active {
    background: white;
    color: #09101f;
  }

  .range-wrap {
    padding: 6px 0 0;
  }

  .range-value {
    margin-top: 10px;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.72);
  }

  input[type="range"] {
    width: 100%;
  }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .toggle-text {
    flex: 1;
  }

  .toggle-title {
    font-weight: 700;
    margin-bottom: 4px;
  }

  .toggle-sub {
    font-size: 0.84rem;
    color: rgba(255,255,255,0.58);
  }

  .switch {
    position: relative;
    width: 56px;
    height: 32px;
    flex-shrink: 0;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    transition: 0.25s;
    cursor: pointer;
  }

  .slider:before {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    left: 4px;
    top: 4px;
    border-radius: 50%;
    background: white;
    transition: 0.25s;
  }

  .switch input:checked + .slider {
    background: rgba(76, 217, 100, 0.55);
  }

  .switch input:checked + .slider:before {
    transform: translateX(24px);
  }

  .save-bar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 14px;
    width: min(440px, calc(100% - 24px));
    background: rgba(8, 12, 25, 0.92);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 12px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  }

  .save-btn {
    width: 100%;
    border: 0;
    border-radius: 16px;
    padding: 15px 16px;
    font-weight: 800;
    font-size: 0.98rem;
    cursor: pointer;
    background: linear-gradient(135deg, #ffffff, #dbe7ff);
    color: #09101f;
  }

  .status {
    margin-top: 10px;
    text-align: center;
    font-size: 0.84rem;
    color: rgba(255,255,255,0.64);
  }

  @media (max-width: 420px) {
    .row-2 {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand-row">
        <div>
          <div class="logo">NEAR</div>
          <div class="subtitle">Profile that feels real</div>
        </div>
        <button class="top-btn">⚙️</button>
      </div>
    </div>

    <div class="screen">
      <section class="card profile-hero">
        <div class="photo-wrap">
          <div class="photo" id="photoPreview">
            <span id="photoEmoji">👤</span>
            <img id="photoImg" alt="Profile photo preview" />
          </div>
          <button class="photo-btn" id="uploadBtn">+</button>
          <input type="file" id="photoInput" accept="image/*" hidden />
        </div>

        <h1 class="hero-name" id="heroName">Your profile</h1>
        <p class="hero-text">
          Keep it honest, simple, and warm. The best profiles feel human.
        </p>
      </section>

      <section class="card section-card">
        <h2 class="section-title">About you</h2>

        <div class="row-2">
          <div class="field">
            <div class="label-row">
              <label class="label" for="nameInput">Name</label>
            </div>
            <input class="input" id="nameInput" type="text" placeholder="Your first name" maxlength="24" />
          </div>

          <div class="field">
            <div class="label-row">
              <label class="label" for="ageInput">Age</label>
            </div>
            <input class="input" id="ageInput" type="number" placeholder="Age" min="18" max="99" />
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <label class="label" for="bioInput">Bio</label>
            <span class="hint"><span id="bioCount">0</span>/160</span>
          </div>
          <textarea class="textarea" id="bioInput" maxlength="160" placeholder="Say a little about yourself. Real works better than perfect."></textarea>
        </div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Your vibe</h2>

        <div class="field">
          <div class="label-row">
            <div class="label">Pick one</div>
          </div>
          <div class="chips" id="vibeChips">
            <button class="chip active" type="button" data-value="Calm">Calm</button>
            <button class="chip" type="button" data-value="Adventurous">Adventurous</button>
            <button class="chip" type="button" data-value="Romantic">Romantic</button>
            <button class="chip" type="button" data-value="Grounded">Grounded</button>
            <button class="chip" type="button" data-value="Playful">Playful</button>
            <button class="chip" type="button" data-value="Deep">Deep</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <label class="label" for="statusInput">Status line</label>
          </div>
          <input class="input" id="statusInput" type="text" maxlength="50" placeholder="Example: Here for something real" />
        </div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Discovery</h2>

        <div class="field">
          <div class="label-row">
            <label class="label" for="distanceRange">Distance preference</label>
            <span class="hint" id="distanceHint">5 km</span>
          </div>
          <div class="range-wrap">
            <input id="distanceRange" type="range" min="1" max="50" value="5" />
            <div class="range-value">How far away people can be shown to you.</div>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <label class="label" for="ageMin">Preferred age range</label>
            <span class="hint" id="ageRangeHint">21 - 35</span>
          </div>
          <div class="row-2">
            <input class="input" id="ageMin" type="number" min="18" max="99" value="21" />
            <input class="input" id="ageMax" type="number" min="18" max="99" value="35" />
          </div>
        </div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">Visibility</h2>

        <div class="toggle-row">
          <div class="toggle-text">
            <div class="toggle-title">Show my profile</div>
            <div class="toggle-sub">When off, people nearby won’t see you.</div>
          </div>
          <label class="switch">
            <input id="visibilityToggle" type="checkbox" checked />
            <span class="slider"></span>
          </label>
        </div>
      </section>
    </div>
  </div>

  <div class="save-bar">
    <button class="save-btn" id="saveBtn">Save Profile</button>
    <div class="status" id="saveStatus">Ready to save</div>
  </div>

  <script>
    const STORAGE_KEY = "nearProfile";

    const nameInput = document.getElementById("nameInput");
    const ageInput = document.getElementById("ageInput");
    const bioInput = document.getElementById("bioInput");
    const bioCount = document.getElementById("bioCount");
    const heroName = document.getElementById("heroName");
    const statusInput = document.getElementById("statusInput");
    const distanceRange = document.getElementById("distanceRange");
    const distanceHint = document.getElementById("distanceHint");
    const ageMin = document.getElementById("ageMin");
    const ageMax = document.getElementById("ageMax");
    const ageRangeHint = document.getElementById("ageRangeHint");
    const visibilityToggle = document.getElementById("visibilityToggle");
    const saveBtn = document.getElementById("saveBtn");
    const saveStatus = document.getElementById("saveStatus");
    const uploadBtn = document.getElementById("uploadBtn");
    const photoInput = document.getElementById("photoInput");
    const photoImg = document.getElementById("photoImg");
    const photoEmoji = document.getElementById("photoEmoji");
    const vibeChips = document.getElementById("vibeChips");

    let selectedVibe = "Calm";
    let photoDataUrl = "";

    function updateHeroName() {
      const name = nameInput.value.trim();
      const age = ageInput.value.trim();
      heroName.textContent = name ? `${name}${age ? ", " + age : ""}` : "Your profile";
    }

    function updateBioCount() {
      bioCount.textContent = bioInput.value.length;
    }

    function updateDistance() {
      distanceHint.textContent = `${distanceRange.value} km`;
    }

    function updateAgeRange() {
      const min = ageMin.value || "18";
      const max = ageMax.value || "99";
      ageRangeHint.textContent = `${min} - ${max}`;
    }

    function showPhoto(dataUrl) {
      if (dataUrl) {
        photoImg.src = dataUrl;
        photoImg.style.display = "block";
        photoEmoji.style.display = "none";
      } else {
        photoImg.src = "";
        photoImg.style.display = "none";
        photoEmoji.style.display = "block";
      }
    }

    function collectProfileData() {
      return {
        name: nameInput.value.trim(),
        age: ageInput.value ? Number(ageInput.value) : "",
        bio: bioInput.value.trim(),
        vibe: selectedVibe,
        status: statusInput.value.trim(),
        maxDistanceKm: Number(distanceRange.value),
        preferredAgeMin: Number(ageMin.value),
        preferredAgeMax: Number(ageMax.value),
        visible: visibilityToggle.checked,
        photoDataUrl: photoDataUrl
      };
    }

    function saveProfile() {
      const profileData = collectProfileData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(profileData));
      saveStatus.textContent = "Profile saved ✓";
    }

    function loadSavedProfile() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;

      try {
        const profile = JSON.parse(saved);

        nameInput.value = profile.name || "";
        ageInput.value = profile.age || "";
        bioInput.value = profile.bio || "";
        statusInput.value = profile.status || "";
        distanceRange.value = profile.maxDistanceKm || 5;
        ageMin.value = profile.preferredAgeMin || 21;
        ageMax.value = profile.preferredAgeMax || 35;
        visibilityToggle.checked = profile.visible !== false;

        if (profile.vibe) {
          selectedVibe = profile.vibe;
          vibeChips.querySelectorAll(".chip").forEach(chip => {
            chip.classList.toggle("active", chip.dataset.value === profile.vibe);
          });
        }

        photoDataUrl = profile.photoDataUrl || "";
        showPhoto(photoDataUrl);

        updateHeroName();
        updateBioCount();
        updateDistance();
        updateAgeRange();

        saveStatus.textContent = "Saved profile loaded";
      } catch (err) {
        console.error("Could not load saved profile", err);
        saveStatus.textContent = "Could not load saved profile";
      }
    }

    nameInput.addEventListener("input", updateHeroName);
    ageInput.addEventListener("input", updateHeroName);
    bioInput.addEventListener("input", updateBioCount);
    distanceRange.addEventListener("input", updateDistance);
    ageMin.addEventListener("input", updateAgeRange);
    ageMax.addEventListener("input", updateAgeRange);

    vibeChips.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        vibeChips.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        selectedVibe = chip.dataset.value;
      });
    });

    uploadBtn.addEventListener("click", () => photoInput.click());

    photoInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        photoDataUrl = reader.result;
        showPhoto(photoDataUrl);
        saveStatus.textContent = "Photo ready to save";
      };
      reader.readAsDataURL(file);
    });

    saveBtn.addEventListener("click", saveProfile);

    updateHeroName();
    updateBioCount();
    updateDistance();
    updateAgeRange();
    loadSavedProfile();
  </script>
</body>
</html>
