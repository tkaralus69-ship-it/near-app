<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GREEN RADAR TEST</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, rgba(76,217,100,0.10), transparent 20%),
        linear-gradient(180deg, #030817 0%, #0a1430 100%);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 18px 140px;
    }

    .topbar {
      padding: 18px 0 14px;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0.18em;
    }

    .tag {
      margin-top: 6px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.72);
    }

    .test-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(76,217,100,0.14);
      color: #9af0af;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .card {
      margin-top: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.28);
      padding: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      border-radius: 20px;
      padding: 14px 10px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-value {
      font-size: 1.08rem;
      font-weight: 850;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.79rem;
      color: rgba(255,255,255,0.52);
    }

    .radar-title {
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .radar-sub {
      color: #9af0af;
      margin-bottom: 18px;
    }

    .radar-wrap {
      display: flex;
      justify-content: center;
    }

    .radar {
      position: relative;
      width: 290px;
      height: 290px;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at center,
          rgba(76,217,100,0.24) 0%,
          rgba(76,217,100,0.12) 18%,
          rgba(76,217,100,0.05) 38%,
          rgba(255,255,255,0.015) 58%,
          transparent 100%);
      border: 1px solid rgba(120,255,160,0.24);
      box-shadow:
        inset 0 0 100px rgba(76,217,100,0.10),
        0 0 40px rgba(76,217,100,0.12),
        0 10px 35px rgba(0,0,0,0.18);
    }

    .ring {
      position: absolute;
      border: 1px solid rgba(140,255,180,0.20);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .ring-1 { width: 80px; height: 80px; }
    .ring-2 { width: 150px; height: 150px; }
    .ring-3 { width: 220px; height: 220px; }
    .ring-4 { width: 290px; height: 290px; }

    .cross-h, .cross-v {
      position: absolute;
      background: rgba(140,255,180,0.14);
    }

    .cross-h {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
    }

    .cross-v {
      width: 1px;
      height: 100%;
      left: 50%;
      top: 0;
    }

    .sweep {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 50%;
      transform-origin: 0% 0%;
      background: linear-gradient(
        90deg,
        rgba(76,217,100,0.38),
        rgba(76,217,100,0.18),
        rgba(76,217,100,0.02)
      );
      animation: sweep 4.8s linear infinite;
      filter: blur(1.2px);
    }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .center-ping {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #ffffff 0%, #dfffe8 65%, #9af0af 100%);
      box-shadow:
        0 0 18px rgba(255,255,255,0.55),
        0 0 38px rgba(76,217,100,0.28);
      z-index: 5;
    }

    .blip {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
    }

    .blip::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.25;
    }

    .mia {
      color: #6ee7ff;
      background: radial-gradient(circle, #ffffff 0%, #dcfbff 40%, #6ee7ff 100%);
      box-shadow: 0 0 22px rgba(110,231,255,0.9);
    }

    .jay {
      color: #ffd86b;
      background: radial-gradient(circle, #ffffff 0%, #fff8d7 40%, #ffd86b 100%);
      box-shadow: 0 0 22px rgba(255,216,107,0.9);
    }

    .aria {
      color: #fff07a;
      background: radial-gradient(circle, #ffffff 0%, #fffde1 40%, #fff07a 100%);
      box-shadow: 0 0 22px rgba(255,240,122,0.9);
    }

    .sienna {
      color: #ff8f5a;
      background: radial-gradient(circle, #ffffff 0%, #ffe5d8 40%, #ff8f5a 100%);
      box-shadow: 0 0 22px rgba(255,143,90,0.9);
    }

    .note {
      margin-top: 18px;
      text-align: center;
      color: rgba(220,255,230,0.88);
      font-size: 0.95rem;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(440px, calc(100% - 24px));
      padding: 10px;
      border-radius: 28px;
      background: rgba(7, 12, 25, 0.94);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.34);
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 10px;
    }

    .nav-btn {
      min-height: 60px;
      border: 0;
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.74);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .nav-btn.me,
    .nav-btn.active {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.07);
      color: white;
    }

    .nav-btn.create {
      background: linear-gradient(135deg, #ffffff, #dfe8ff 56%, #bfd2ff);
      color: #09101f;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="logo">NEAR</div>
      <div class="tag">Radar for real people nearby</div>
      <div class="test-badge">GREEN RADAR TEST</div>
    </div>

    <div class="card">
      <div class="stats">
        <div class="stat">
          <div class="stat-value">4</div>
          <div class="stat-label">Nearby</div>
        </div>
        <div class="stat">
          <div class="stat-value">15 km</div>
          <div class="stat-label">Range</div>
        </div>
        <div class="stat">
          <div class="stat-value">Now</div>
          <div class="stat-label">Live</div>
        </div>
      </div>

      <div class="radar-title">NEAR Radar</div>
      <div class="radar-sub">Green live scan + vibe colors</div>

      <div class="radar-wrap">
        <div class="radar">
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-3"></div>
          <div class="ring ring-4"></div>
          <div class="cross-h"></div>
          <div class="cross-v"></div>
          <div class="sweep"></div>
          <div class="center-ping"></div>

          <div class="blip mia" style="left:66%;top:28%;"></div>
          <div class="blip jay" style="left:28%;top:61%;"></div>
          <div class="blip aria" style="left:58%;top:68%;"></div>
          <div class="blip sienna" style="left:35%;top:28%;"></div>
        </div>
      </div>

      <div class="note">If you see green and multicolored blips, the new file is loading.</div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn me"><span>👤</span><span>Me</span></button>
    <button class="nav-btn create"><span>✦</span><span>Create</span></button>
    <button class="nav-btn active"><span>📍</span><span>Radar</span></button>
  </div>
</body>
</html>
